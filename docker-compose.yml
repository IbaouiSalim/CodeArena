version: "3.9"

services:
  # TCP proxy for Docker socket access (backend needs to spawn containers)
  docker-proxy:
    image: alpine/socat
    command: TCP-LISTEN:2375,reuseaddr,fork UNIX-CONNECT:/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - codearena
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - CODEARENA_DB_PATH=/app/data/codearena.db
      - DOCKER_HOST=tcp://docker-proxy:2375
    depends_on:
      - compiler-images
      - docker-proxy
    restart: unless-stopped
    volumes:
      - backend-data:/app/data
    networks:
      - codearena

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://backend:8080
    networks:
      - codearena

  compiler-images:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infra/docker:/dockerfiles
    command: >
      sh -c "
        docker build -t codearena-python -f /dockerfiles/python.Dockerfile /dockerfiles &&
        docker build -t codearena-go -f /dockerfiles/go.Dockerfile /dockerfiles &&
        docker build -t codearena-cpp -f /dockerfiles/cpp.Dockerfile /dockerfiles &&
        docker build -t codearena-rust -f /dockerfiles/rust.Dockerfile /dockerfiles &&
        docker build -t codearena-javascript -f /dockerfiles/javascript.Dockerfile /dockerfiles &&
        echo 'All compiler images built successfully'
      "
    restart: "no"

volumes:
  backend-data:

networks:
  codearena:
