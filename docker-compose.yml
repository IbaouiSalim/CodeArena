version: "3.9"

services:
  traefik:
    image: traefik:v3.0
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8081:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - codearena
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - CODEARENA_DB_PATH=/app/data/codearena.db
      - DOCKER_HOST=unix:///var/run/docker.sock
    depends_on:
      - compiler-images
    restart: unless-stopped
    volumes:
      - backend-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - codearena
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=web,websecure"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.backend-ratelimit.ratelimit.average=5"
      - "traefik.http.middlewares.backend-ratelimit.ratelimit.period=1s"
      - "traefik.http.middlewares.backend-ratelimit.ratelimit.burst=10"
      - "traefik.http.routers.backend.middlewares=backend-ratelimit"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:8080
    networks:
      - codearena
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web,websecure"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      - "traefik.http.routers.frontend.priority=1"

  compiler-images:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infra/docker:/dockerfiles
    command: >
      sh -c "
        docker build -t codearena-python -f /dockerfiles/python.Dockerfile /dockerfiles &&
        docker build -t codearena-go -f /dockerfiles/go.Dockerfile /dockerfiles &&
        docker build -t codearena-cpp -f /dockerfiles/cpp.Dockerfile /dockerfiles &&
        docker build -t codearena-rust -f /dockerfiles/rust.Dockerfile /dockerfiles &&
        docker build -t codearena-javascript -f /dockerfiles/javascript.Dockerfile /dockerfiles &&
        echo 'All compiler images built successfully'
      "
    restart: "no"

volumes:
  backend-data:

networks:
  codearena:
