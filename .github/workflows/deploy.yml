name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run Go tests
        working-directory: backend
        run: go test ./... -v -count=1 -coverprofile=coverage.out

      - name: Upload Go coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: backend/coverage.out

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Run Vitest
        working-directory: frontend
        run: npx vitest run --coverage

  build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build compiler images
        run: |
          docker build -t codearena-python -f infra/docker/python.Dockerfile infra/docker
          docker build -t codearena-go -f infra/docker/go.Dockerfile infra/docker
          docker build -t codearena-cpp -f infra/docker/cpp.Dockerfile infra/docker
          docker build -t codearena-rust -f infra/docker/rust.Dockerfile infra/docker
          docker build -t codearena-javascript -f infra/docker/javascript.Dockerfile infra/docker

      - name: Build backend image
        run: docker build -t codearena-backend ./backend

      - name: Build frontend image
        run: docker build -t codearena-frontend ./frontend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/codearena
            git pull origin main
            docker compose -f docker-compose.prod.yml up --build -d
            echo "Deployment complete"
